# BRAIN

Project-level brain. This is the **shared mind of the project**: every agent
bound to this project reads and writes the same `brain.cortex`. All
handoffs, pulses, sessions, lessons, focus, and active context live HERE —
not in separate files. This guarantees that multiple agents working
concurrently share a single project mind.

# FOCUS
(one-sentence current focus of the project — set by the governor)

# OBJECTIVES
(stable project-level goals, not tasks)

# SESSIONS
(agents currently bound to this project — written by `project.bind`)

# HANDOFFS
(chronological log of work handed between agents — written by handlers on task transitions)

# PULSE
(append-only event trace — replaces pulse.jsonl. Written by `evidence.record` and task handlers)

# LESSONS
(contextual lessons — apply to this project only. Behavioral lessons live in the identity's .cortex)

# ACTIVE_CONTEXT
(currently active cycle/task — updated by handlers on task state changes)

# RISKS
(project-specific risks and mitigations)

# CONCURRENCY
(optimistic-locking state — brain_version bumps on every write. Do not edit by hand)

