name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install --upgrade pip
          uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          uv run ruff check src/ tests/

      - name: Type-check with mypy (warn-only)
        run: |
          uv run mypy src/arqux/ || true
        continue-on-error: true

      - name: Test with pytest and coverage
        run: |
          uv run pytest --cov=arqux --cov-fail-under=65 -v

      - name: Validate arqux init
        run: |
          uv run arqux init --path /tmp/test-ws
          test -f /tmp/test-ws/AGENTS.md
          test -d /tmp/test-ws/.arqux/skills/workflows
          test -f /tmp/test-ws/.arqux/meta-brain.cortex
          grep -q "DOM:arqux" /tmp/test-ws/.arqux/meta-brain.cortex

      - name: Validate handlers count
        run: |
          COUNT=$(uv run arqux handlers | wc -l)
          test "$COUNT" -ge 73
          echo "Handlers: $COUNT"

      - name: Validate AGENTS.md hash
        run: |
          TEMPLATE_HASH=$(sha256sum src/arqux/templates/AGENTS.md | cut -d' ' -f1)
          INSTALLED_HASH=$(sha256sum /tmp/test-ws/AGENTS.md | cut -d' ' -f1)
          test "$TEMPLATE_HASH" = "$INSTALLED_HASH"

      - name: Validate permissions (P0-B regression)
        run: |
          uv run python -c "
          import os
          os.environ['ARQUX_STRICT_ROLES'] = '1'
          from arqux.permissions import PermissionContext, PermissionDenied, ROLE_AUDITOR
          ctx = PermissionContext(agent_id='heimdall', role=ROLE_AUDITOR, verified=True)
          for h in ['blueprint.cancel', 'cortex.entry.delete', 'task.fail']:
              try:
                  ctx.check(h)
                  raise SystemExit(f'FAIL: auditor can call {h}')
              except PermissionDenied:
                  pass
          print('P0-B regression: PASS')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install ruff
      - name: Ruff check
        run: |
          uv run ruff check src/ tests/
